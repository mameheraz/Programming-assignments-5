<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind And DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawesome Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#F8FAFC]">

    <header class=" p-5 border-b-2 border-[#E9E9E9] flex justify-between ">
        <div class=" w-11/12 mx-auto logo flex items-center gap-2">
            <img src="./assets/github-logo.png" class="w-[3%]" alt="">
            <h2 class="font-semibold text-[#1F2937] text-[24px]">GitHub Issues Tracker</h2>
        </div>

        <div class="seach-bar">
            <div class="join flex gap-2">
                <div>
                    <label class="input validator join-item">
                        <i class="fa-brands fa-sistrix"></i>
                        <input id="inputSearch" class="" type="email" placeholder="Search issues..." required />
                    </label>
                </div>
                <button id="btnSearch" class="btn bg-[#4A00FF] text-white join-item rounded-sm"><i class="fa-solid fa-plus"></i>New
                    Issue</button>
            </div>
        </div>
    </header>


    <!-- issues section -->
    <section class="w-9/12 mx-auto pt-10 pb-5 ">
        <div class="bg-white shadow-md px-5 py-2 rounded-md">
            <button id="all-btn" onclick="loadIssues(); activeButton('all-btn')"
                class="btn text-black hover:bg-[#4A00FF] hover:text-white w-[100px] active-btn">All</button>
            <button id="open-btn" onclick="openIssues(); activeButton('open-btn')"
                class="btn outline-gray-100 w-[100px] text-black hover:bg-[#4A00FF] hover:text-white ">Open</button>
            <button id="close-btn" onclick="ClosedIssues(); activeButton('close-btn')"
                class="btn outline-gray-100 w-100px text-black hover:bg-[#4A00FF] hover:text-white ">Closed</button>
        </div>
    </section>



    <!-- Spinner -->
    <section id="spinner" class="flex justify-center items-center p-5 hidden">
        <span class="loading loading-ring loading-xl"></span>
    </section>


    <!-- Container -->

    <section class="w-9/12 mx-auto">
        <div class="bg-white shadow-md px-5 py-2 rounded-md flex items-center justify-between">
            <div class="flex items-center gap-3 ">
                <img src="./assets/Aperture.png" alt="">
                <div class="right">
                    <h2 id="issues-counter" class="text-[#1F2937] font-semibold text-[20px]">50 Issues</h2>
                    <p class="font-extralight text-4 text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="right flex items-center gap-2">
                <img src="./assets/open.png" alt="">
                <img src="./assets/close.png" alt="">
            </div>
        </div>
    </section>

    <!-- Issues Container -->

    <section id="issues-container" class="bg-white shadow-sm p-10 w-9/12 mx-auto grid grid-cols-4 gap-3">

    </section>



    <section id="modal-container">

    </section>



    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="modalContainer">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn bg-[#4A00FF] text-white">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="./mainpage.js"></script>
</body>

</html>
