<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind And DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawesome Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body class=" bg-[#F8FAFC] p-15">

    <section class=" max-w-[520px] bg-white shadow-md mx-auto rounded-md text-center p-10">

        <div>
            <img class="mx-auto w-[20%] mb-2" src="./assets/github-logo.png" alt="">
            <h2 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h2>
            <p class="text-[16px] font-extralight text-[#64748B]">Sign in to manage your issues</p>
        </div>


        <div>
            <div class="card bg-base-100 w-full shrink-0 mx-auto">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-[#1F2937] font-medium text-[16px]">Username</label>
                        <input id="username" maxlength="5" minlength="5" type="text" class="input w-full p-6" placeholder="Enter Username" />

                        <label class="label text-[#1F2937] font-medium text-[16px] ">Password</label>
                        <input id="password" type="password" class="input w-full p-6" placeholder="Password" />
                        <button id="login-btn" class="btn mt-4 bg-[#4A00FF] text-white p-6">Sign In</button>
                    </fieldset>
                </div>
            </div>
        </div>

        <div class="flex items-center">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-2 text-gray-500">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>
    </section>






    <script src="./login.js"></script>
</body>
</html>
